// ===== 渲染逻辑 =====
function renderDetail(data, code) {
  var detail = DETAIL_CONTENT[code];
  if (!detail) {
    // 如果找不到详细解读，使用 data.js 中的基础数据
    detail = {
      main: data.desc || '暂无详细解读',
      hidden: data.roast || '暂无深层内核解读',
      scene: '适合在需要发挥个人优势的场合中展现自我。',
      tip: '做真实的自己，找到让自己舒适的节奏。'
    };
  }

  // 填充人格大图区
  document.getElementById('heroImg').src = data.img || '';
  document.getElementById('heroImg').alt = data.name || '人格图片';
  document.getElementById('heroName').textContent = data.name || '未知人格';
  document.getElementById('heroCode').textContent = data.code || code;
  // 稀有度：主人格显示"人群占比"，隐藏人格保持原样
  var rarityText = data.rarity || '';
  if (rarityText && !data.isHidden && rarityText.indexOf('约') !== -1) {
    rarityText = '人群占比 ' + rarityText;
  }
  document.getElementById('heroRarity').textContent = rarityText;
  document.getElementById('heroSlogan').textContent = data.slogan || '';

  // 设置稀有度样式
  var rarityEl = document.getElementById('heroRarity');
  if (data.isHidden) {
    rarityEl.className = 'hero-rarity rarity-legend';
  } else {
    // 根据 rarity 字段判断
    var r = data.rarity || '';
    if (r.indexOf('10') !== -1 || r.indexOf('8') !== -1) {
      rarityEl.className = 'hero-rarity rarity-common';
    } else if (r.indexOf('6') !== -1) {
      rarityEl.className = 'hero-rarity rarity-rare';
    } else if (r.indexOf('5') !== -1) {
      rarityEl.className = 'hero-rarity rarity-epic';
    } else if (r.indexOf('3') !== -1) {
      rarityEl.className = 'hero-rarity rarity-legend';
    } else {
      rarityEl.className = 'hero-rarity rarity-common';
    }
  }

  // 填充详细解读
  document.getElementById('mainDesc').textContent = detail.main;
  document.getElementById('hiddenDesc').textContent = detail.hidden;
  document.getElementById('sceneDesc').textContent = detail.scene;
  document.getElementById('tipDesc').textContent = detail.tip;

  // 填充标签
  var tagsContainer = document.getElementById('detailTags');
  tagsContainer.innerHTML = '';
  var tags = data.tags || [];
  // 如果 tags 不够，补充一些默认标签
  if (tags.length === 0) {
    tags = ['#BTI人格', '#反差人格'];
  }
  tags.forEach(function(tag) {
    var span = document.createElement('span');
    span.textContent = tag;
    tagsContainer.appendChild(span);
  });

  // 设置页面标题
  document.title = data.name + ' - BTI ' + code + ' 人格图鉴';
}

// ===== 主逻辑 =====
if (typeData) {
  // 有 code 参数，显示详情页
  document.getElementById('guidePage').style.display = 'none';
  document.getElementById('detailPage').style.display = 'block';
  renderDetail(typeData, code);
} else {
  // 无 code 参数，显示引导页
  document.getElementById('guidePage').classList.add('active');
  document.getElementById('detailPage').style.display = 'none';
}
</script>
