<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTI 版本管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1625;color:#f0eef6;height:100vh;display:flex;overflow:hidden}

/* 左侧边栏 */
.sidebar{width:300px;background:#0f0d1a;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-header h1{font-size:18px;font-weight:800;color:#a78bfa;letter-spacing:1px}
.sidebar-header p{font-size:12px;color:#6b7280;margin-top:4px}

.version-list{flex:1;overflow-y:auto;padding:8px}
.ver-item{padding:14px 16px;margin:4px 8px;border-radius:10px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.ver-item:hover{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.15)}
.ver-item.active{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.3)}
.ver-item.latest{background:rgba(72,219,251,.06);border-color:rgba(72,219,251,.15)}
.ver-item.latest.active{background:rgba(72,219,251,.12);border-color:rgba(72,219,251,.3)}

.ver-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:6px}
.ver-badge.current{background:rgba(72,219,251,.15);color:#48dbfb}
.ver-badge.history{background:rgba(167,139,250,.15);color:#a78bfa}

.ver-name{font-size:15px;font-weight:700;color:#e5e7eb}
.ver-date{font-size:11px;color:#6b7280;margin-top:2px}
.ver-desc{font-size:12px;color:#9ca3af;margin-top:6px;line-height:1.6}
.ver-file{font-size:11px;color:#5f6cff;margin-top:6px;font-family:monospace}

.sidebar-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#4b5563;text-align:center}

/* 右侧预览区 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{height:50px;background:#0f0d1a;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.toolbar-label{font-size:12px;color:#6b7280}
.toolbar-file{color:#a78bfa;font-size:13px;font-weight:600;font-family:monospace}
.toolbar a{color:#5f6cff;text-decoration:none;font-size:13px;margin-left:auto;padding:6px 14px;background:rgba(95,108,255,.1);border-radius:8px;border:1px solid rgba(95,108,255,.2);transition:all .2s}
.toolbar a:hover{background:rgba(95,108,255,.2)}

.preview-wrap{flex:1;position:relative;background:#0a0a14}
.preview-frame{width:100%;height:100%;border:none;display:block}

/* 空状态 */
.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#4b5563}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* 响应式 */
@media(max-width:768px){
  .sidebar{width:240px}
  .ver-desc{display:none}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>📦 BTI 版本管理</h1>
    <p>点击左侧版本在右侧预览</p>
  </div>
  <div class="version-list" id="versionList"></div>
  <div class="sidebar-footer">
    共 <span id="verCount">0</span> 个版本 · 最新 v3.3
  </div>
</div>

<div class="main">
  <div class="toolbar">
    <span class="toolbar-label">当前预览：</span>
    <span class="toolbar-file" id="currentFile">-</span>
    <a id="openLink" href="#" target="_blank">↗ 新标签页打开</a>
  </div>
  <div class="preview-wrap">
    <iframe id="previewFrame" class="preview-frame" src=""></iframe>
  </div>
</div>

<script>
// 版本定义：每次发布新版本时在这里添加
const VERSIONS = [
  {
    ver: 'v3.3',
    file: 'index.html',
    date: '2026-06-01',
    isLatest: true,
    changes: [
      '修复：结果页颜色对比度不足（字母解码、警示栏、输入框）',
      '修复：分享卡片链接改为可点击超链接',
      '移除：分享卡片二维码（生成不稳定）',
      '新增：分享卡片底部链接复制区（一键复制发给好友）',
      '修复：shareCard 截图后清理 shareArea 残留内联样式',
      '移除：默契度对比页"生成对比卡片"和"我也测一个"按钮',
      '修复：对比页分享链接改为可点击超链接'
    ]
  },
  {
    ver: 'v3.2',
    file: 'versions/index_v3.2.html',
    date: '2026-05-31',
    isLatest: false,
    changes: [
      '修复：加深结果页多处浅色文字，提升可读性'
    ]
  },
  {
    ver: 'v3.1',
    file: 'versions/index_v3.1.html',
    date: '2026-05-30',
    isLatest: false,
    changes: [
      '新增：人格字母解码说明',
      '新增：结果页免责声明'
    ]
  },
  {
    ver: 'v3.0',
    file: 'versions/index_v3.0.html',
    date: '2026-05-28',
    isLatest: false,
    changes: [
      '项目初始版本'
    ]
  }
];

function renderVersions() {
  var list = document.getElementById('versionList');
  var html = '';
  for (var i = 0; i < VERSIONS.length; i++) {
    var v = VERSIONS[i];
    var cls = 'ver-item' + (v.isLatest ? ' latest' : '');
    var badge = v.isLatest ? '<span class="ver-badge current">当前 · 可测试</span>' : '<span class="ver-badge history">历史备份</span>';
    var changesHtml = v.changes.map(function(c){ return '· ' + c; }).join('<br>');
    html += '<div class="' + cls + '" data-index="' + i + '" onclick="selectVersion(' + i + ')">';
    html += badge;
    html += '<div class="ver-name">BTI 反差人格测试 ' + v.ver + '</div>';
    html += '<div class="ver-date">' + v.date + '</div>';
    html += '<div class="ver-desc">' + changesHtml + '</div>';
    html += '<div class="ver-file">' + v.file + '</div>';
    html += '</div>';
  }
  list.innerHTML = html;
  document.getElementById('verCount').textContent = VERSIONS.length;
}

function selectVersion(index) {
  var items = document.querySelectorAll('.ver-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.remove('active');
  }
  items[index].classList.add('active');

  var v = VERSIONS[index];
  document.getElementById('previewFrame').src = v.file;
  document.getElementById('currentFile').textContent = v.file;
  document.getElementById('openLink').href = v.file;
}

// 初始化：默认选中最新版
renderVersions();
selectVersion(0);
</script>

</body>
</html>
